<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0">
  <title>Hệ thống Ôn tập - Trắc nghiệm</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f0f2f5;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 20px;
      padding-top: 150px; 
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    .sticky-header {
      position: fixed; top: 0; left: 0; right: 0;
      background: #0b2b4f; color: white; z-index: 1000;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      display: flex; flex-direction: column; align-items: center;
    }
    .header-content {
      max-width: 900px; width: 100%;
      display: flex; justify-content: space-between; align-items: center; padding: 12px 20px;
    }
    .manager-content {
      max-width: 900px; width: 100%; background: #1e4572; padding: 10px 20px;
      display: flex; gap: 15px; align-items: center; flex-wrap: wrap;
    }
    
    .stats-box { display: flex; gap: 15px; font-size: 1rem; font-weight: 600; }
    .stat-item {
      background: rgba(255,255,255,0.15); padding: 6px 15px; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.3);
    }

    select, input[type="file"] { padding: 8px; border-radius: 6px; border: none; font-size: 0.95rem; }
    select { cursor: pointer; min-width: 200px; font-weight: bold; }
    
    .file-upload-wrapper { position: relative; overflow: hidden; display: inline-block; }
    .btn-upload {
        background: #10b981; color: white; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; border: none;
    }
    .file-upload-wrapper input[type=file] {
        font-size: 100px; position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer;
    }

    .container { max-width: 900px; width: 100%; }
    
    .question-card {
      background: white; border-radius: 16px; padding: 25px; margin-bottom: 25px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 2px solid transparent; transition: all 0.3s ease; position: relative;
    }
    
    .q-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; gap: 15px; }
    .q-title { font-size: 1.1rem; font-weight: 700; color: #1e293b; line-height: 1.5; }
    .q-num {
      background: #1e6f9f; color: white; min-width: 32px; height: 32px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center; font-weight: 800; flex-shrink: 0;
    }

    .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
    .option-item {
      display: flex; align-items: center; gap: 12px; padding: 12px 16px;
      border-radius: 10px; background: #f8fafc; border: 1px solid #e2e8f0; cursor: pointer; transition: 0.2s;
    }
    .option-item:hover { background: #f1f5f9; }
    .option-item input { width: 18px; height: 18px; cursor: pointer; }

    .submit-q-btn {
      background: #1e6f9f; color: white; border: none; padding: 10px 24px; border-radius: 8px;
      font-weight: 700; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px;
    }
    .submit-q-btn:hover { background: #0e4b6b; transform: translateY(-1px); }
    .submit-q-btn:disabled { background: #cbd5e1; cursor: not-allowed; transform: none; }

    .card-correct { border-color: #10b981; background: #f0fdf4; }
    .card-wrong { border-color: #ef4444; background: #fef2f2; }
    .card-partial { border-color: #f59e0b; background: #fffbeb; }

    .opt-correct { background: #dcfce7 !important; border-color: #22c55e !important; font-weight: 600; }
    .opt-wrong { background: #fee2e2 !important; border-color: #ef4444 !important; }
    
    .status-badge { font-weight: 800; padding: 4px 12px; border-radius: 6px; font-size: 0.9rem; margin-left: 10px; }
    
    .explanation-box {
      margin-top: 15px; padding: 15px; background: #e0f2fe; border-left: 4px solid #0284c7;
      border-radius: 6px; font-size: 0.95rem; color: #0f172a; display: none; line-height: 1.5;
    }
    .explanation-box strong { color: #0284c7; }

    pre { background: #1e293b; color: #e2e8f0; padding: 15px; border-radius: 8px; font-size: 0.85rem; margin: 10px 0; overflow-x: auto; }
    .reset-all { background: #ef4444; color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; }

    @media (max-width: 600px) {
      .header-content { flex-direction: column; gap: 10px; text-align: center; }
      .manager-content { flex-direction: column; }
      select { width: 100%; }
      body { padding-top: 200px; }
    }
  </style>
</head>
<body>

<div class="sticky-header">
  <div class="header-content">
    <div class="stats-box">
      <div class="stat-item">✅ Đúng: <span id="correctCount">0</span> / <span id="totalQuestions">0</span></div>
      <div class="stat-item">📊 Điểm: <span id="livePoints">0.00</span></div>
    </div>
    <button class="reset-all" onclick="resetCurrentQuiz()">🔄 Đảo câu & Làm lại</button>
  </div>
  <div class="manager-content">
    <span style="font-weight: bold;">📚 Chọn bộ đề:</span>
    <select id="quizSelector" onchange="switchQuiz()"></select>
    
    <div class="file-upload-wrapper">
      <button class="btn-upload">➕ Thêm file JSON</button>
      <input type="file" id="jsonUpload" accept=".json" onchange="handleFileUpload(event)">
    </div>
  </div>
</div>

</div>

  let quizzes = [
    { id: "default_1", name: "Bộ đề 1 (Chuyển đổi số - 50 Câu)", data: defaultData }
  ];
  let currentQuizId = "default_1";
  let activeQuestions = [];

  function shuffle(arr) {
    let array = [...arr];
    for (let i = array.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
  }

  function loadActiveQuiz() {
    const quiz = quizzes.find(q => q.id === currentQuizId);
    document.getElementById('quizTitle').innerText = `📝 ${quiz.name}`;
    document.getElementById('totalQuestions').innerText = quiz.data.length;
    
    document.getElementById('correctCount').innerText = "0";
    document.getElementById('livePoints').innerText = "0.00";

    activeQuestions = shuffle(quiz.data).map(q => {
      const indices = q.options.map((_, i) => i);
      const shuffledIdx = shuffle(indices);
      return {
        ...q,
        options: shuffledIdx.map(i => q.options[i]),
        correct: q.correct.map(c => shuffledIdx.indexOf(c))
      };
    });

    renderUI();
  }

  function renderQuizSelector() {
    const selector = document.getElementById('quizSelector');
    selector.innerHTML = quizzes.map(q => `<option value="${q.id}" ${q.id === currentQuizId ? 'selected' : ''}>${q.name}</option>`).join('');
  }

  function switchQuiz() {
    currentQuizId = document.getElementById('quizSelector').value;
    loadActiveQuiz();
  }

  window.resetCurrentQuiz = function() {
    loadActiveQuiz();
  }

  window.handleFileUpload = function(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const uploadedData = JSON.parse(e.target.result);
        if (!Array.isArray(uploadedData) || uploadedData.length === 0 || !uploadedData[0].options) {
            throw new Error("Cấu trúc JSON không hợp lệ.");
        }
        const newId = "quiz_" + Date.now();
        const baseName = file.name.replace('.json', '');
        const newName = `${baseName} - Bộ đề ${quizzes.length + 1}`;
        
        quizzes.push({ id: newId, name: newName, data: uploadedData });
        currentQuizId = newId; 
        renderQuizSelector();
        loadActiveQuiz();
        document.getElementById('jsonUpload').value = "";
        alert(`Đã thêm thành công: ${newName}`);
      } catch (err) {
        alert("Lỗi khi đọc file JSON: " + err.message);
      }
    };
    reader.readAsText(file);
  }

  function renderUI() {
    const container = document.getElementById('quizContainer');
    container.innerHTML = activeQuestions.map((q, i) => `
      <div class="question-card" id="card-${i}">
        <div class="q-header">
          <div style="display: flex; gap: 12px; align-items: flex-start;">
            <span class="q-num">${i+1}</span>
            <div class="q-title">${q.title} <span id="badge-${i}"></span></div>
          </div>
        </div>
        <div class="options">
          ${q.options.map((opt, optIdx) => `
            <label class="option-item" id="label-${i}-${optIdx}">
              <input type="checkbox" id="check-${i}-${optIdx}">
              <span>${opt}</span>
            </label>
          `).join('')}
        </div>
        <button class="submit-q-btn" id="btn-${i}" onclick="submitQuestion(${i})">
          🚀 Nộp bài câu này
        </button>
        
        <div class="explanation-box" id="expl-${i}">
            ${q.explanation ? q.explanation : "<em>Không có giải thích cụ thể cho câu hỏi này.</em>"}
        </div>
      </div>
    `).join('');
  }

  window.submitQuestion = function(qIdx) {
    const q = activeQuestions[qIdx];
    const correctSet = new Set(q.correct);
    const selected = [];
    
    q.options.forEach((_, optIdx) => {
      const cb = document.getElementById(`check-${qIdx}-${optIdx}`);
      if(cb.checked) selected.push(optIdx);
      cb.disabled = true;
    });

    if (selected.length === 0) {
      alert("Vui lòng chọn ít nhất một đáp án trước khi nộp!");
      q.options.forEach((_, optIdx) => document.getElementById(`check-${qIdx}-${optIdx}`).disabled = false);
      return;
    }

    const card = document.getElementById(`card-${qIdx}`);
    const badge = document.getElementById(`badge-${qIdx}`);
    const btn = document.getElementById(`btn-${qIdx}`);
    const explBox = document.getElementById(`expl-${qIdx}`);
    
    btn.disabled = true;
    btn.innerText = "🔒 Đã chấm điểm";

    q.options.forEach((_, optIdx) => {
      const label = document.getElementById(`label-${qIdx}-${optIdx}`);
      const isCorrect = correctSet.has(optIdx);
      const isSelected = selected.includes(optIdx);

      if (isCorrect) {
        label.classList.add('opt-correct');
      } else if (isSelected && !isCorrect) {
        label.classList.add('opt-wrong');
      }
    });

    const hasWrong = selected.some(s => !correctSet.has(s));
    const correctCount = selected.filter(s => correctSet.has(s)).length;
    const isPerfect = (correctCount === correctSet.size) && !hasWrong;

    if (hasWrong) {
      card.classList.add('card-wrong');
      badge.innerHTML = `<span class="status-badge" style="background:#fee2e2; color:#ef4444;">Sai (0đ)</span>`;
    } else if (isPerfect) {
      card.classList.add('card-correct');
      badge.innerHTML = `<span class="status-badge" style="background:#dcfce7; color:#10b981;">Chính xác! (+1đ)</span>`;
    } else {
      card.classList.add('card-partial');
      const p = (correctCount / correctSet.size).toFixed(2);
      badge.innerHTML = `<span class="status-badge" style="background:#fffbeb; color:#f59e0b;">Thiếu (${p}đ)</span>`;
    }

    explBox.style.display = "block";
    updateHeaderStats();
  };

  function updateHeaderStats() {
    let totalPoints = 0;
    let perfectCount = 0;

    activeQuestions.forEach((q, i) => {
      const btn = document.getElementById(`btn-${i}`);
      if (btn && btn.disabled) {
        const correctSet = new Set(q.correct);
        const selected = [];
        q.options.forEach((_, optIdx) => {
          if(document.getElementById(`check-${i}-${optIdx}`).checked) selected.push(optIdx);
        });

        const hasWrong = selected.some(s => !correctSet.has(s));
        if (!hasWrong) {
          const score = selected.length / correctSet.size;
          totalPoints += score;
          if (score === 1) perfectCount++;
        }
      }
    });

    document.getElementById('correctCount').innerText = perfectCount;
    document.getElementById('livePoints').innerText = totalPoints.toFixed(2);
  }

  renderQuizSelector();
  loadActiveQuiz();
</script>

</body>
</html>
