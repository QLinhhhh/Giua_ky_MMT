<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0">
  <title>60 câu ôn tập DBMS - Submit từng câu</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f0f2f5;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 20px;
      padding-top: 90px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    /* STICKY SCOREBOARD */
    .sticky-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: #0b2b4f;
      color: white;
      z-index: 1000;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      padding: 12px 20px;
      display: flex;
      justify-content: center;
    }
    .header-content {
      max-width: 900px;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .stats-box {
      display: flex;
      gap: 15px;
      font-size: 1rem;
      font-weight: 600;
    }
    .stat-item {
      background: rgba(255,255,255,0.15);
      padding: 6px 15px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.3);
    }

    .container {
      max-width: 900px;
      width: 100%;
    }
    
    .question-card {
      background: white;
      border-radius: 16px;
      padding: 25px;
      margin-bottom: 25px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      border: 2px solid transparent;
      transition: all 0.3s ease;
      position: relative;
    }
    
    .q-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 15px;
      gap: 15px;
    }
    .q-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #1e293b;
      line-height: 1.5;
    }
    .q-num {
      background: #1e6f9f;
      color: white;
      min-width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      flex-shrink: 0;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 20px;
    }
    .option-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 10px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      cursor: pointer;
      transition: 0.2s;
    }
    .option-item:hover { background: #f1f5f9; }
    .option-item input { width: 18px; height: 18px; cursor: pointer; }

    /* NÚT SUBMIT CÂU HỎI */
    .submit-q-btn {
      background: #1e6f9f;
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .submit-q-btn:hover { background: #0e4b6b; transform: translateY(-1px); }
    .submit-q-btn:disabled { background: #cbd5e1; cursor: not-allowed; transform: none; }

    /* TRẠNG THÁI ĐÚNG SAI */
    .card-correct { border-color: #10b981; background: #f0fdf4; }
    .card-wrong { border-color: #ef4444; background: #fef2f2; }
    .card-partial { border-color: #f59e0b; background: #fffbeb; }

    .opt-correct { background: #dcfce7 !important; border-color: #22c55e !important; font-weight: 600; }
    .opt-wrong { background: #fee2e2 !important; border-color: #ef4444 !important; }
    
    .status-badge {
      font-weight: 800;
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 0.9rem;
      margin-left: 10px;
    }

    pre {
      background: #1e293b; color: #e2e8f0; padding: 15px;
      border-radius: 8px; font-size: 0.85rem; margin: 10px 0; overflow-x: auto;
    }

    .reset-all {
      background: #ef4444; color: white; border: none; padding: 8px 16px;
      border-radius: 8px; cursor: pointer; font-weight: 600;
    }

    @media (max-width: 600px) {
      .header-content { flex-direction: column; gap: 10px; text-align: center; }
      .stats-box { font-size: 0.85rem; }
    }
  </style>
</head>
<body>

<div class="sticky-header">
  <div class="header-content">
    <div class="stats-box">
      <div class="stat-item">✅ Đúng: <span id="correctCount">0</span> / 60</div>
      <div class="stat-item">📊 Điểm: <span id="livePoints">0.00</span></div>
    </div>
    <button class="reset-all" onclick="location.reload()">🔄 Đảo câu & Làm lại</button>
  </div>
</div>

<div class="container">
  <h1 style="margin-bottom: 25px; color: #0f172a;">🗄️ DBMS Quiz - Multiple Choice</h1>
  <div id="quizContainer"></div>
</div>

<script>

  const rawData = [
      { id:1, title:"View trong DBMS là gì?", options:["Một loại index","Một bảng vật lý lưu dữ liệu","Một bảng ảo được tạo từ câu lệnh SELECT ","Một loại Partition"], correct:[2] },

      { id:12, title:"Clustered Index ảnh hưởng như thế nào tới dữ liệu?", options:["Xóa dữ liệu","Mã hóa dữ liệu","Sắp xếp vật lý dữ liệu trên đĩa ","Không ảnh hưởng"], correct:[2] },
      { id:13, title:"Một bảng thường có tối đa bao nhiêu Clustered Index?", options:["1 ","Không giới hạn","0","2"], correct:[0] },
      { id:14, title:"Một bảng thường có tối đa bao nhiêu Non-Clustered Index?", options:["2","0","Không giới hạn ","1"], correct:[2] },

      { id:16, title:"Rủi ro của Trigger là gì?", options:["Không có rủi ro nào","Có thể tạo vòng lặp trigger ","Gây giảm hiệu năng ","Logic khó debug "], correct:[1,2,3] },
      { id:17, title:"Partitioning là kỹ thuật gì?", options:["Mã hóa dữ liệu","Nén dữ liệu","Chia nhỏ bảng/index thành nhiều phần ","Sao lưu DB"], correct:[2] },
      { id:18, title:"Range Partitioning thường áp dụng cho dữ liệu nào?", options:["Dữ liệu dạng số ","Dữ liệu nào cũng áp dụng được","Dữ liệu dạng văn bản","Theo khoảng thời gian/ngày tháng "], correct:[0,3] },

      { id:20, title:"ROLLBACK dùng để:", options:["Xác nhận dữ liệu","Khôi phục transaction chưa commit ","Khôi phục transaction, dữ liệu bị thay đổi","Khôi phục transaction, dữ liệu không bị thay đổi"], correct:[1] },
      { id:21, title:"Dirty Read xảy ra khi:", options:["Đọc view","Đọc dữ liệu bị mã hóa","Đọc dữ liệu đã backup","Đọc dữ liệu chưa commit của transaction khác "], correct:[3] },

      { id:27, title:"Replication trong DBMS dùng để:", options:["Tạo index","Đồng bộ dữ liệu giữa nhiều server ","Chia bảng","Tạo trigger"], correct:[1] },
      { id:28, title:"Master-Slave Replication có đặc điểm nào?", options:["Slave đọc dữ liệu ","Không đồng bộ dữ liệu","Master gửi dữ liệu sang Slave ","Slave ghi dữ liệu chính"], correct:[0,2] },
      { id:29, title:"Câu lệnh nào tạo đúng một View tên vw_Students?", options:["CREATE VIEW vw_Students AS SELECT * FROM Students; ","MAKE VIEW vw_Students;","CREATE TABLE vw_Students AS SELECT * FROM Students;","NEW VIEW vw_Students;"], correct:[0] },

      { id:31, title:"Procedure dưới đây có bao nhiêu parameter? <pre>CREATE PROCEDURE sp_AddStudent\n@Name NVARCHAR(100),\n@Age INT</pre>", options:["3","1","0","2 "], correct:[3] },

      { id:37, title:"Isolation Level cao nhất là:", options:["REPEATABLE READ","READ UNCOMMITTED","SERIALIZABLE ","READ COMMITTED"], correct:[2] },
      { id:38, title:"SAVEPOINT dùng để:", options:["Đánh dấu điểm rollback trong transaction ","Backup DB","Tạo replication","Tạo index"], correct:[0] },
      { id:39, title:"LIST Partitioning dùng khi:", options:["Chia theo hash function","Chia dữ liệu theo danh sách giá trị xác định ","Chia ngẫu nhiên dữ liệu","Chia theo index"], correct:[1] },
      { id:40, title:"Ví dụ phù hợp với LIST Partitioning là:", options:["Chia theo ngày tháng","Chia theo số ngẫu nhiên","Chia theo quốc gia: VN, US, JP ","Chia theo năm"], correct:[2] },
      { id:41, title:"Query nào tận dụng index tốt nhất?", options:["SELECT * FROM Orders WHERE CustomerID = 5; ","SELECT * FROM Orders WHERE YEAR(OrderDate) = 2025;","SELECT * FROM Orders WHERE OrderDate = '2025-01-01';","SELECT * FROM Orders WHERE TotalAmount > 1000;"], correct:[0] },
      { id:42, title:"Vì sao query sau có thể không dùng index hiệu quả? <pre>SELECT *\nFROM Orders\nWHERE YEAR(OrderDate) = 2025;</pre>", options:["Vì thiếu GROUP BY","Vì kiểm tra điều kiện qua các functions của cột index ","Vì SELECT *","Vì YEAR() làm mất khả năng seek index "], correct:[1,3] },
      { id:43, title:"Cho query sau. Index nào tối ưu nhất? <pre>SELECT ProductName, Price\nFROM Products\nWHERE CategoryID = 1;</pre>", options:["CREATE INDEX idx2 ON Products(CategoryID) INCLUDE(ProductName, Price); ","CREATE INDEX idx4 ON Products(Price);","CREATE INDEX idx3 ON Products(ProductName);","CREATE INDEX idx1 ON Products(CategoryID);"], correct:[0] },
      { id:44, title:"Trong Composite Index, thứ tự cột ảnh hưởng đến:", options:["Khả năng sử dụng index của query ","Không ảnh hưởng gì","Có phụ thuộc vào thứ tự ","Phụ thuộc vào thứ từ từ phải sang trái"], correct:[0,2] },
      { id:45, title:"Clustered Index khác Nonclustered Index ở điểm:", options:["Không khác nhau","Clustered Index sắp xếp dữ liệu vật lý ","Clustered Index nhanh hơn mọi trường hợp","Nonclustered Index không chứa key"], correct:[1] },
      { id:46, title:"Cho query sau. Vì sao index có thể không hiệu quả? <pre>SELECT *\nFROM Customers\nWHERE Email LIKE '%gmail.com';</pre>", options:["Vì Email là VARCHAR","Wildcard ở đầu chuỗi ","Vì SELECT *","Vì kiểm tra điều kiện với LIKE trên chuỗi văn bản"], correct:[1] },
      { id:47, title:"Cho đoạn code sau: <pre>BEGIN TRANSACTION;\nUPDATE Products\nSET Stock = Stock - 1\nWHERE ProductID = 10;\nROLLBACK;</pre>", options:["Transaction vẫn commit","Stock không thay đổi ","Stock giảm 1","Product bị xóa"], correct:[1] },
      { id:48, title:"Isolation Level nào cho phép Dirty Read?", options:["READ UNCOMMITTED ","SERIALIZABLE","READ COMMITTED","REPEATABLE READ"], correct:[0] },
      { id:49, title:"Cho transaction: <pre>BEGIN TRANSACTION;\nDELETE FROM Orders WHERE OrderID = 1;\nDELETE FROM OrderDetails WHERE OrderID = 1;\nCOMMIT;</pre>", options:["Không cần COMMIT","Sai syntax","Có thể vi phạm khóa ngoại nếu xóa Orders trước ","Không vấn đề gì"], correct:[2] },
      { id:50, title:"Trong hệ thống lưu log hàng tỷ bản ghi theo thời gian, loại partitioning phù hợp nhất là:", options:["LIST Partitioning","HASH Partitioning","KEY Partitioning","RANGE Partitioning theo ngày/tháng "], correct:[3] },
      { id:51, title:"Cho bảng partition theo HASH(CustomerID). Ưu điểm lớn nhất của HASH Partitioning là gì?", options:["Không cần index","Query theo ngày nhanh hơn","Dữ liệu phân phối đồng đều giữa các partition ","Không cần statistics"], correct:[2] },

      { id:58, title:"Ví dụ điển hình của hệ thống OLAP là:", options:["Báo cáo phân tích doanh thu ","ATM ngân hàng","Đặt hàng online","Thanh toán online"], correct:[0] },
      { id:59, title:"Hệ thống nào thường yêu cầu ACID nghiêm ngặt hơn?", options:["OLTP ","Backup System","OLAP"], correct:[0] },
      { id:60, title:"Hệ thống nào thường dùng Data Warehouse?", options:["OLAP ","OLTP"], correct:[0] }
  ];

  // Logic trộn
  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  const questions = shuffle([...rawData]).map(q => {
    const indices = q.options.map((_, i) => i);
    const shuffledIdx = shuffle(indices);
    return {
      ...q,
      options: shuffledIdx.map(i => q.options[i]),
      correct: q.correct.map(c => shuffledIdx.indexOf(c))
    };
  });

  // Render UI
  function render() {
    const container = document.getElementById('quizContainer');
    container.innerHTML = questions.map((q, i) => `
      <div class="question-card" id="card-${i}">
        <div class="q-header">
          <div style="display: flex; gap: 12px; align-items: flex-start;">
            <span class="q-num">${i+1}</span>
            <div class="q-title">${q.title} <span id="badge-${i}"></span></div>
          </div>
        </div>
        <div class="options">
          ${q.options.map((opt, optIdx) => `
            <label class="option-item" id="label-${i}-${optIdx}">
              <input type="checkbox" id="check-${i}-${optIdx}">
              <span>${opt}</span>
            </label>
          `).join('')}
        </div>
        <button class="submit-q-btn" id="btn-${i}" onclick="submitQuestion(${i})">
          🚀 Nộp bài câu này
        </button>
      </div>
    `).join('');
  }

  // Xử lý nộp bài cho từng câu
  window.submitQuestion = function(qIdx) {
    const q = questions[qIdx];
    const correctSet = new Set(q.correct);
    const selected = [];
    
    // Thu thập đáp án người dùng chọn
    q.options.forEach((_, optIdx) => {
      const cb = document.getElementById(`check-${qIdx}-${optIdx}`);
      if(cb.checked) selected.push(optIdx);
      cb.disabled = true; // Khóa input sau khi nộp
    });

    if (selected.length === 0) {
      alert("Vui lòng chọn ít nhất một đáp án trước khi nộp!");
      q.options.forEach((_, optIdx) => document.getElementById(`check-${qIdx}-${optIdx}`).disabled = false);
      return;
    }

    const card = document.getElementById(`card-${qIdx}`);
    const badge = document.getElementById(`badge-${qIdx}`);
    const btn = document.getElementById(`btn-${qIdx}`);
    
    btn.disabled = true;
    btn.innerText = "🔒 Đã chấm điểm";

    // Hiển thị đáp án đúng/sai trên từng option
    q.options.forEach((_, optIdx) => {
      const label = document.getElementById(`label-${qIdx}-${optIdx}`);
      const isCorrect = correctSet.has(optIdx);
      const isSelected = selected.includes(optIdx);

      if (isCorrect) {
        label.classList.add('opt-correct');
      } else if (isSelected && !isCorrect) {
        label.classList.add('opt-wrong');
      }
    });

    // Tính toán kết quả cho câu hỏi
    const hasWrong = selected.some(s => !correctSet.has(s));
    const correctCount = selected.filter(s => correctSet.has(s)).length;
    const isPerfect = (correctCount === correctSet.size) && !hasWrong;

    if (hasWrong) {
      card.classList.add('card-wrong');
      badge.innerHTML = `<span class="status-badge" style="background:#fee2e2; color:#ef4444;">Sai (0đ)</span>`;
    } else if (isPerfect) {
      card.classList.add('card-correct');
      badge.innerHTML = `<span class="status-badge" style="background:#dcfce7; color:#10b981;">Chính xác! (+1đ)</span>`;
    } else {
      card.classList.add('card-partial');
      const p = (correctCount / correctSet.size).toFixed(2);
      badge.innerHTML = `<span class="status-badge" style="background:#fffbeb; color:#f59e0b;">Thiếu (${p}đ)</span>`;
    }

    updateHeaderStats();
  };

  function updateHeaderStats() {
    let totalPoints = 0;
    let perfectCount = 0;

    questions.forEach((q, i) => {
      const btn = document.getElementById(`btn-${i}`);
      if (btn && btn.disabled) { // Chỉ tính những câu đã nộp
        const correctSet = new Set(q.correct);
        const selected = [];
        q.options.forEach((_, optIdx) => {
          if(document.getElementById(`check-${i}-${optIdx}`).checked) selected.push(optIdx);
        });

        const hasWrong = selected.some(s => !correctSet.has(s));
        if (!hasWrong) {
          const score = selected.length / correctSet.size;
          totalPoints += score;
          if (score === 1) perfectCount++;
        }
      }
    });

    document.getElementById('correctCount').innerText = perfectCount;
    document.getElementById('livePoints').innerText = totalPoints.toFixed(2);
  }

  render();
</script>

</body>
</html>
